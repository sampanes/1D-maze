<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bg" cx="50%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#1a003d"/>
      <stop offset="100%" stop-color="#06000f"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="3" fill="url(#bg)"/>

  <!-- Isometric cube faces -->
  <!-- Left face (violet) -->
  <polygon points="4,11 16,17 16,29 4,23" fill="#2a0052"/>
  <!-- Right face (teal) -->
  <polygon points="28,11 28,23 16,29 16,17" fill="#003d5c"/>
  <!-- Top face (magenta) -->
  <polygon points="16,3 28,11 16,17 4,11" fill="#7a0044"/>

  <!-- Neon glowing edges -->
  <g filter="url(#glow)">
    <!-- Top-face outline -->
    <polyline points="16,3 28,11 16,17 4,11 16,3" fill="none" stroke="#ff1aaa" stroke-width="0.9" stroke-linejoin="round"/>
    <!-- Vertical edges -->
    <line x1="4"  y1="11" x2="4"  y2="23" stroke="#c040ff" stroke-width="0.9"/>
    <line x1="28" y1="11" x2="28" y2="23" stroke="#00e5ff" stroke-width="0.9"/>
    <line x1="16" y1="17" x2="16" y2="29" stroke="#e040fb" stroke-width="0.8"/>
    <!-- Bottom edges -->
    <line x1="4"  y1="23" x2="16" y2="29" stroke="#c040ff" stroke-width="0.9"/>
    <line x1="28" y1="23" x2="16" y2="29" stroke="#00e5ff" stroke-width="0.9"/>
    <!-- Top vertex highlight -->
    <circle cx="16" cy="3" r="1.1" fill="#ff80d0"/>
  </g>

  <!-- Grid lines on top face (synthwave grid feel) -->
  <g opacity="0.35">
    <!-- Vertical dividers across top face -->
    <line x1="10" y1="7" x2="22" y2="13" stroke="#ff80d0" stroke-width="0.4"/>
    <line x1="22" y1="7" x2="10" y2="13" stroke="#ff80d0" stroke-width="0.4"/>
  </g>
</svg>
